name: wallzy
description: "A new Flutter project."
publish_to: "none"

version: 2.2.1+7 #!BUMP THIS VERSION

environment:
  sdk: ^3.10.0

dependencies:
  android_intent_plus: ^6.0.0
  android_notification_icons: ^0.0.1
  app_links: ^7.0.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^6.0.1
  collection: ^1.19.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  dotlottie_loader: ^0.0.5
  dynamic_color: ^1.7.0
  firebase_auth: ^6.0.2
  firebase_core: ^4.1.0
  firebase_storage: ^13.0.1
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_cache_manager: ^3.4.1
  flutter_contacts: ^1.1.8
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^19.4.2
  flutter_riverpod: ^3.0.0
  flutter_svg: ^2.2.1
  flutter_timezone: ^5.0.1
  google_fonts: ^6.3.1
  google_sign_in: ^6.2.1
  http: ^1.6.0
  hugeicons: ^1.1.4
  image_picker: ^1.2.1
  intl: ^0.20.2
  local_auth: ^3.0.0
  lottie: ^3.3.2
  material_color_utilities: ^0.13.0
  permission_handler: ^12.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  timezone: ^0.10.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ledgr_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ledgr_logo.png"
  adaptive_icon_monochrome: "assets/images/ledgr_monochrome.png"
  remove_alpha_ios: true

android_notification_icons:
  image_path: "android/app/src/main/res/drawable/ic_notification.png"
  icon_name: "ic_notification"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/vectors/
    - assets/fonts/
    - assets/json/
    - assets/lottie/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf

    - family: Momo
      fonts:
        - asset: assets/fonts/MomoTrustDisplay-Regular.ttf
